name: Web release validation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-web-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install -r requirements-web.txt
      - run: npm --prefix web_frontend install
      - run: npm --prefix web_frontend run build
      - run: python -m unittest discover -s tests -v
      - run: python run_web.py --check
